<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QB-HUD</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="hud-container" class="hud-visible">
        <!-- Top Info Bar -->
        <div class="top-bar">
            <div class="location-info">
                <div class="location-main" id="location">Los Santos</div>
                <div class="location-street" id="street">Unknown Street</div>
            </div>
            
            <div class="time-info">
                <div class="time" id="time">00:00</div>
                <div class="players" id="players">👥 0</div>
            </div>
        </div>

        <!-- Left Side - Status Bars -->
        <div class="left-panel">
            <!-- Health -->
            <div class="status-item health">
                <div class="status-header">
                    <span class="status-icon">❤️</span>
                    <span class="status-label">HEALTH</span>
                    <span class="status-value" id="health-value">100</span>
                </div>
                <div class="status-bar">
                    <div class="status-fill" id="health-fill" style="width: 100%"></div>
                </div>
            </div>

            <!-- Armor -->
            <div class="status-item armor">
                <div class="status-header">
                    <span class="status-icon">🛡️</span>
                    <span class="status-label">ARMOR</span>
                    <span class="status-value" id="armor-value">0</span>
                </div>
                <div class="status-bar">
                    <div class="status-fill" id="armor-fill" style="width: 0%"></div>
                </div>
            </div>

            <!-- Hunger -->
            <div class="status-item hunger">
                <div class="status-header">
                    <span class="status-icon">🍖</span>
                    <span class="status-label">HUNGER</span>
                    <span class="status-value" id="hunger-value">100</span>
                </div>
                <div class="status-bar">
                    <div class="status-fill" id="hunger-fill" style="width: 100%"></div>
                </div>
            </div>

            <!-- Thirst -->
            <div class="status-item thirst">
                <div class="status-header">
                    <span class="status-icon">💧</span>
                    <span class="status-label">THIRST</span>
                    <span class="status-value" id="thirst-value">100</span>
                </div>
                <div class="status-bar">
                    <div class="status-fill" id="thirst-fill" style="width: 100%"></div>
                </div>
            </div>

            <!-- Stress -->
            <div class="status-item stress">
                <div class="status-header">
                    <span class="status-icon">😰</span>
                    <span class="status-label">STRESS</span>
                    <span class="status-value" id="stress-value">0</span>
                </div>
                <div class="status-bar">
                    <div class="status-fill" id="stress-fill" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- Right Side - Money & Job -->
        <div class="right-panel">
            <!-- Job Info -->
            <div class="info-box job-info">
                <div class="info-title">JOB</div>
                <div class="info-content">
                    <div class="job-label" id="job">Unemployed</div>
                    <div class="job-grade" id="job-grade"></div>
                </div>
            </div>

            <!-- Money -->
            <div class="money-box">
                <div class="money-item cash">
                    <span class="money-label">CASH</span>
                    <span class="money-value" id="cash">$0</span>
                </div>
                <div class="money-item bank">
                    <span class="money-label">BANK</span>
                    <span class="money-value" id="bank">$0</span>
                </div>
            </div>
        </div>

        <!-- Bottom - Speedometer -->
        <div class="bottom-bar">
            <div class="speedometer-container" id="speedometer-container" style="display: none;">
                <div class="speed-display">
                    <div class="speed-value" id="speed">0</div>
                    <div class="speed-unit">MPH</div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
