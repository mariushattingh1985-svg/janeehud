<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Janee HUD</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="hud-container" class="hud-active">
        <!-- Top Bar -->
        <div class="hud-top">
            <div class="location-info">
                <span id="location">Los Santos</span>
                <span id="time">00:00</span>
            </div>
        </div>

        <!-- Bottom Left - Status Bars -->
        <div class="hud-bottom-left">
            <!-- Health -->
            <div class="status-bar health-bar">
                <div class="status-label">
                    <span>❤️ Health</span>
                    <span id="health-value" class="status-value">100</span>
                </div>
                <div class="progress-bar">
                    <div id="health-progress" class="progress-fill health" style="width: 100%"></div>
                </div>
            </div>

            <!-- Armor -->
            <div class="status-bar armor-bar">
                <div class="status-label">
                    <span>🛡️ Armor</span>
                    <span id="armor-value" class="status-value">0</span>
                </div>
                <div class="progress-bar">
                    <div id="armor-progress" class="progress-fill armor" style="width: 0%"></div>
                </div>
            </div>

            <!-- Hunger -->
            <div class="status-bar hunger-bar">
                <div class="status-label">
                    <span>🍖 Hunger</span>
                    <span id="hunger-value" class="status-value">100</span>
                </div>
                <div class="progress-bar">
                    <div id="hunger-progress" class="progress-fill hunger" style="width: 100%"></div>
                </div>
            </div>

            <!-- Thirst -->
            <div class="status-bar thirst-bar">
                <div class="status-label">
                    <span>💧 Thirst</span>
                    <span id="thirst-value" class="status-value">100</span>
                </div>
                <div class="progress-bar">
                    <div id="thirst-progress" class="progress-fill thirst" style="width: 100%"></div>
                </div>
            </div>

            <!-- Stress -->
            <div class="status-bar stress-bar">
                <div class="status-label">
                    <span>😰 Stress</span>
                    <span id="stress-value" class="status-value">0</span>
                </div>
                <div class="progress-bar">
                    <div id="stress-progress" class="progress-fill stress" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- Bottom Right - Money & Speedometer -->
        <div class="hud-bottom-right">
            <!-- Money Display -->
            <div class="money-display">
                <div class="money-item cash">
                    <span class="money-label">Cash</span>
                    <span id="cash-value" class="money-value">$0</span>
                </div>
                <div class="money-item bank">
                    <span class="money-label">Bank</span>
                    <span id="bank-value" class="money-value">$0</span>
                </div>
            </div>

            <!-- Speedometer -->
            <div class="speedometer-display">
                <div class="speed-info">
                    <span class="speed-label">Speed</span>
                    <span id="speed-value" class="speed-value">0</span>
                    <span class="speed-unit">mph</span>
                </div>
            </div>
        </div>

        <!-- Status Indicators -->
        <div class="status-indicators">
            <div id="talking-indicator" class="indicator talking" title="Talking">
                <span class="pulse"></span> 🎤
            </div>
            <div id="speaker-indicator" class="indicator speaker" title="Speaker">
                <span class="pulse"></span> 🔊
            </div>
            <div id="recording-indicator" class="indicator recording" title="Recording">
                <span class="pulse"></span> 🔴
            </div>
            <div id="handcuffed-indicator" class="indicator handcuffed" title="Handcuffed">
                <span class="pulse"></span> 🔒
            </div>
        </div>

        <!-- Notifications -->
        <div id="notifications" class="notifications-container"></div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/hud.js"></script>
</body>
</html>
